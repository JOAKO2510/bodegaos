<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — BodegaOS</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .chat-layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 57px); overflow: hidden; }

    /* Lista de conversaciones */
    .conv-list { border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg2); }
    .conv-search { padding: 12px; border-bottom: 1px solid var(--border); }
    .conv-search input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 7px 12px; font-size: 0.85rem; outline: none; font-family: var(--font-main); }
    .conv-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .conv-item:hover, .conv-item.active { background: rgba(0,229,160,0.07); }
    .conv-item .conv-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
    .conv-item .conv-preview { font-size: 0.78rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

    /* Panel de chat */
    .chat-panel { display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 12px; }
    .chat-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; color: var(--bg); flex-shrink: 0; }
    .chat-header-info .name { font-weight: 700; }
    .chat-header-info .phone { font-size: 0.78rem; color: var(--text2); font-family: var(--font-mono); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 72%; padding: 9px 14px; border-radius: 14px; font-size: 0.88rem; line-height: 1.5; white-space: pre-wrap; }
    .msg.entrante { background: var(--bg3); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 3px; }
    .msg.saliente { background: rgba(0,229,160,0.12); border: 1px solid rgba(0,229,160,0.25); align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg .msg-time { font-size: 0.65rem; color: var(--text2); margin-top: 4px; text-align: right; font-family: var(--font-mono); }
    .chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--bg2); }

    /* Simulador WhatsApp */
    .simulator-bar { background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; }
    .simulator-bar .sim-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-family: var(--font-mono); margin-bottom: 8px; }
    .sim-row { display: flex; gap: 8px; }
    .sim-row input { flex: 1; }

    .chat-compose { display: flex; gap: 8px; }
    .chat-compose input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 14px; font-size: 0.9rem; outline: none; font-family: var(--font-main); }
    .chat-compose input:focus { border-color: var(--accent); }

    .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text2); gap: 12px; }
    .empty-chat .icon { font-size: 3rem; }
  </style>
</head>
<body>
<script src="js/utils.js"></script>
<script src="js/sidebar.js"></script>
<script>renderSidebar();</script>

<div class="main">
  <div class="topbar">
    <h1>Chat &amp; WhatsApp</h1>
    <span class="badge" id="unread-count">0 sin leer</span>
  </div>

  <div class="chat-layout">
    <!-- Lista de clientes -->
    <div class="conv-list">
      <div class="conv-search">
        <input type="text" id="search-conv" placeholder="Buscar conversación..." oninput="filterConvs()" />
      </div>
      <div id="conv-list-items"></div>
    </div>

    <!-- Panel derecho -->
    <div class="chat-panel" id="chat-panel">
      <div class="empty-chat">
        <div class="icon">💬</div>
        <p>Selecciona una conversación</p>
        <p style="font-size:0.8rem">o simula un mensaje de WhatsApp</p>
      </div>
    </div>
  </div>
</div>

<script>
let clientes = [];
let currentClienteId = null;
let pollInterval = null;

async function loadClientes() {
  try {
    clientes = await apiFetch("/clientes/?activo=true&limit=500");
    renderConvList(clientes);
    countUnread();
  } catch (e) { toast(e.message, "error"); }
}

function filterConvs() {
  const q = document.getElementById("search-conv").value.toLowerCase();
  const filtered = clientes.filter(c =>
    c.nombre.toLowerCase().includes(q) || (c.telefono || "").includes(q)
  );
  renderConvList(filtered);
}

function renderConvList(list) {
  const container = document.getElementById("conv-list-items");
  container.innerHTML = list.map(c => `
    <div class="conv-item ${c.id === currentClienteId ? 'active' : ''}" onclick="openChat(${c.id})">
      <div class="conv-name">
        <span>${c.nombre}</span>
      </div>
      <div class="conv-preview">${c.telefono || c.correo || 'Sin contacto'}</div>
    </div>`).join("");
}

async function countUnread() {
  try {
    const msgs = await apiFetch("/mensajes/?limit=500");
    const unread = msgs.filter(m => !m.leido && m.tipo === "entrante").length;
    document.getElementById("unread-count").textContent = unread + " sin leer";
  } catch (e) {}
}

async function openChat(clienteId) {
  currentClienteId = clienteId;
  const cliente = clientes.find(c => c.id === clienteId);
  renderConvList(clientes);

  // Marcar como leídos
  await apiFetch(`/mensajes/cliente/${clienteId}/leer-todos`, { method: "PUT" }).catch(() => {});
  countUnread();

  // Renderizar panel
  const initials = cliente.nombre.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  document.getElementById("chat-panel").innerHTML = `
    <div class="chat-header">
      <div class="chat-avatar">${initials}</div>
      <div class="chat-header-info">
        <div class="name">${cliente.nombre}</div>
        <div class="phone">${cliente.telefono || '—'} · ${estadoBadge(cliente.tipo_cliente)}</div>
      </div>
      <div style="margin-left:auto">
        <a href="pedidos.html" class="btn btn-secondary btn-sm">🛒 Ver pedidos</a>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="text-muted" style="text-align:center;font-size:0.8rem">Cargando mensajes...</div>
    </div>
    <div class="chat-input-area">
      <div class="simulator-bar">
        <div class="sim-label">📱 Simular mensaje de WhatsApp</div>
        <div class="sim-row">
          <input class="form-control" id="sim-tel" placeholder="Teléfono del cliente" value="${cliente.telefono || ''}" />
          <input class="form-control" id="sim-nombre" placeholder="Nombre (si es nuevo)" value="${cliente.nombre}" />
        </div>
        <div class="sim-row" style="margin-top:8px">
          <input class="form-control" id="sim-msg" placeholder="Escribe el mensaje como si fueras el cliente..." 
            onkeydown="if(event.key==='Enter')enviarSimulacion()" />
          <button class="btn btn-primary" onclick="enviarSimulacion()">📤 Enviar</button>
        </div>
      </div>
    </div>`;

  loadMessages(clienteId);

  // Polling
  clearInterval(pollInterval);
  pollInterval = setInterval(() => loadMessages(clienteId), 4000);
}

async function loadMessages(clienteId) {
  try {
    const msgs = await apiFetch(`/mensajes/cliente/${clienteId}`);
    const container = document.getElementById("chat-messages");
    if (!container) return;
    container.innerHTML = msgs.length === 0
      ? `<div class="empty-state"><div class="empty-icon">💬</div><p>Sin mensajes aún</p></div>`
      : msgs.map(m => `
        <div class="msg ${m.tipo}">
          <div>${escapeHtml(m.contenido)}</div>
          <div class="msg-time">${fmtDate(m.fecha_creacion)}</div>
        </div>`).join("");
    container.scrollTop = container.scrollHeight;
  } catch (e) {}
}

async function enviarSimulacion() {
  const telefono = document.getElementById("sim-tel").value.trim();
  const mensaje  = document.getElementById("sim-msg").value.trim();
  const nombre   = document.getElementById("sim-nombre").value.trim();
  if (!telefono || !mensaje) { toast("Ingresa teléfono y mensaje", "warn"); return; }
  try {
    await apiFetch("/webhook/whatsapp", {
      method: "POST",
      body: JSON.stringify({ telefono, mensaje, nombre: nombre || null }),
    });
    document.getElementById("sim-msg").value = "";
    // Recargar clientes por si se creó uno nuevo
    clientes = await apiFetch("/clientes/?activo=true&limit=500");
    renderConvList(clientes);
    loadMessages(currentClienteId);
    countUnread();
  } catch (e) { toast(e.message, "error"); }
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

loadClientes();
</script>
</body>
</html>
